name: Feature request
description: Propose a focused improvement to VoiceHub.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Describe the user problem first. VoiceHub intentionally avoids automatic cross-application control and cloud sync in its current scope.

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What workflow is difficult today, and who is affected?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Explain the smallest useful behavior change.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Include manual workflow alternatives when relevant.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Do not include credentials or private transcripts.
